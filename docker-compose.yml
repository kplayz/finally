services:
  finally:
    build: .
    image: finally:latest
    container_name: finally
    ports:
      - "8000:8000"
    volumes:
      - finally-data:/app/db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  finally-data:
